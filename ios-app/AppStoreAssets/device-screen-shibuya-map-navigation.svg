<svg xmlns="http://www.w3.org/2000/svg" width="466" height="466" viewBox="0 0 466 466" role="img" aria-labelledby="title desc">
  <title id="title">BikeComputer device map and navigation screen mockup</title>
  <desc id="desc">A square AMOLED-style bike computer screen showing a Shibuya map, highlighted route, and navigation instruction.</desc>
  <defs>
    <clipPath id="screenClip">
      <rect width="466" height="466" rx="58"/>
    </clipPath>
    <filter id="routeGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="mapShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d0f"/>
      <stop offset="0.52" stop-color="#15191b"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="navPanel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111315"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>

  <rect width="466" height="466" rx="58" fill="#000000"/>
  <g clip-path="url(#screenClip)">
    <rect width="466" height="466" fill="url(#mapShade)"/>

    <g opacity="0.48" stroke-linecap="round" fill="none">
      <path d="M-42 108 C42 100 86 122 144 114 S250 84 319 98 S420 134 508 110" stroke="#5c6468" stroke-width="9"/>
      <path d="M-20 208 C54 184 98 190 156 226 S260 286 346 244 S436 190 492 205" stroke="#60686d" stroke-width="8"/>
      <path d="M-30 346 C52 324 104 336 176 362 S300 390 374 350 S434 300 504 316" stroke="#525a5e" stroke-width="7"/>
      <path d="M48 -28 C84 52 88 121 122 188 S170 302 150 496" stroke="#616a6e" stroke-width="8"/>
      <path d="M230 -24 C218 60 238 134 278 194 S334 318 318 502" stroke="#566064" stroke-width="8"/>
      <path d="M385 -22 C350 50 350 128 380 203 S430 318 420 504" stroke="#596267" stroke-width="7"/>
      <path d="M-34 64 L512 408" stroke="#42494d" stroke-width="4"/>
      <path d="M-46 400 L514 38" stroke="#3f464a" stroke-width="4"/>
      <path d="M14 268 L460 34" stroke="#495155" stroke-width="5"/>
      <path d="M90 486 L442 -28" stroke="#3e464a" stroke-width="4"/>
    </g>

    <g opacity="0.38" stroke="#252b2e" stroke-width="2" fill="none">
      <path d="M26 160 H444"/>
      <path d="M22 302 H460"/>
      <path d="M188 4 V460"/>
      <path d="M342 0 V466"/>
    </g>

    <g font-family="Inter, Helvetica, Arial, sans-serif" fill="#a9b1b5" opacity="0.78">
      <text x="244" y="72" font-size="16" font-weight="600">Miyashita Park</text>
      <text x="60" y="254" font-size="15" font-weight="600">Shibuya Sta.</text>
      <text x="274" y="325" font-size="15" font-weight="600">Shibuya Crossing</text>
      <text x="326" y="186" font-size="13" font-weight="500" opacity="0.7">Koen-dori</text>
    </g>

    <g filter="url(#routeGlow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M86 388 C116 350 141 316 170 282 C205 241 238 220 278 203 C314 188 342 169 372 132" stroke="#ff1515" stroke-width="17"/>
      <path d="M86 388 C116 350 141 316 170 282 C205 241 238 220 278 203 C314 188 342 169 372 132" stroke="#ff7777" stroke-width="5" opacity="0.75"/>
    </g>

    <circle cx="86" cy="388" r="16" fill="#ffffff"/>
    <circle cx="86" cy="388" r="9" fill="#ff1717"/>
    <g transform="translate(372 132) rotate(-42)">
      <path d="M0 -19 L22 18 H-22 Z" fill="#ffffff"/>
      <path d="M0 -11 L13 12 H-13 Z" fill="#ff1717"/>
    </g>

    <rect x="0" y="0" width="466" height="124" fill="url(#navPanel)" opacity="0.96"/>
    <g opacity="0.92">
      <text x="25" y="34" fill="#f7f7f7" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="500">12:31</text>
      <circle cx="349" cy="24" r="4" fill="#ffffff"/>
      <circle cx="363" cy="24" r="4" fill="#ffffff" opacity="0.75"/>
      <circle cx="377" cy="24" r="4" fill="#ffffff" opacity="0.45"/>
      <rect x="408" y="17" width="34" height="14" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
      <rect x="443" y="21" width="3" height="6" rx="1.5" fill="#ffffff"/>
      <rect x="412" y="20" width="24" height="8" rx="2" fill="#ffffff"/>
    </g>

    <g transform="translate(35 70)">
      <path d="M0 0 H39 V-25 L78 8 39 41 V16 H0 Z" fill="#ff1717"/>
      <path d="M0 0 H39 V-25 L78 8 39 41 V16 H0 Z" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
    </g>
    <text x="135" y="83" fill="#ffffff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="700">Turn right</text>
    <text x="135" y="110" fill="#d8d8d8" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="500">180 m  Shibuya Crossing</text>

    <g transform="translate(350 362)">
      <circle cx="43" cy="43" r="43" fill="#050505" opacity="0.88"/>
      <path d="M43 12 L62 72 L43 60 L24 72 Z" fill="#ffffff"/>
      <path d="M43 24 L53 57 L43 51 L33 57 Z" fill="#ff1717"/>
    </g>

    <rect x="165" y="438" width="136" height="5" rx="2.5" fill="#5a5a5a"/>
  </g>
</svg>
