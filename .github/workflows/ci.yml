name: CI

on:
  push:
  pull_request:

jobs:
  esp32:
    name: ESP32 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - WAVESHARE_AMOLED_175
          - WAVESHARE_AMOLED_206
          - WAVESHARE_AMOLED_206_SPEAKER_HONK
    defaults:
      run:
        working-directory: esp32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build firmware
        run: pio run -e "${{ matrix.target }}"

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift helper tests
        run: ./scripts/run-navigation-tests.sh
        working-directory: ios-app
      - name: Build app
        run: |
          xcodebuild \
            -project BikeComputer/BikeComputer.xcodeproj \
            -scheme BikeComputer \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: ios-app

  osm:
    name: OSM Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OSM_Extract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml
      - name: Python syntax
        run: |
          python -m py_compile \
            scripts/extract_features.py \
            scripts/feature_types.py \
            scripts/funcs.py \
            scripts/map_format.py \
            tests/test_config.py \
            tests/test_feature_types.py \
            tests/test_map_format.py
      - name: YAML/config tests
        run: python -m unittest discover -s tests
      - name: Shell syntax
        run: bash -n scripts/pbf_to_geojson.sh
      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./OSM_Extract/scripts
      - name: Compose config
        run: docker compose config
      - name: Build tools image
        run: docker compose build tools
      - name: Smoke test tools image
        run: docker compose run --rm tools python -c "import mapnik; import matplotlib; import shapely; import yaml; from osgeo import ogr"

  backend:
    name: Map Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax
        run: python -m py_compile map_platform/*.py tests/*.py
      - name: Unit tests
        run: python -m unittest discover -s tests

  esp32-host:
    name: ESP32 Host Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp32
    steps:
      - uses: actions/checkout@v4
      - name: GUI layout host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_gui_layout.cpp \
            -o /tmp/test_gui_layout_175
          /tmp/test_gui_layout_175
          g++ -std=c++17 \
            -DWAVESHARE_AMOLED_206 \
            tools/tests/test_gui_layout.cpp \
            -o /tmp/test_gui_layout_206
          /tmp/test_gui_layout_206
      - name: Map profile protocol host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_map_profile_protocol.cpp \
            -o /tmp/test_map_profile_protocol
          /tmp/test_map_profile_protocol
      - name: Map profile persistence host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_map_profile_persistence.cpp \
            -o /tmp/test_map_profile_persistence
          /tmp/test_map_profile_persistence
      - name: Map transfer host tests
        run: |
          g++ -std=c++17 \
            lib/map_transfer/map_transfer.cpp \
            tools/tests/test_map_transfer.cpp \
            -o /tmp/test_map_transfer
          /tmp/test_map_transfer
      - name: Sound protocol host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_sound_protocol.cpp \
            -o /tmp/test_sound_protocol
          /tmp/test_sound_protocol
      - name: Codec recovery host tests
        run: |
          cc -std=c11 -Wall -Wextra \
            -Itools/tests/host_stubs \
            -Ilib/esp_codec_dev/src \
            tools/tests/test_codec_open.c \
            lib/esp_codec_dev/src/esp_codec_dev.c \
            -lm \
            -o /tmp/test_codec_open
          /tmp/test_codec_open
          cc -std=c11 -Wall -Wextra \
            -Itools/tests/host_stubs \
            -Ilib/esp_codec_dev/src \
            tools/tests/test_es8311_recovery.c \
            lib/esp_codec_dev/src/esp_codec_dev_vol.c \
            -lm \
            -o /tmp/test_es8311_recovery
          /tmp/test_es8311_recovery
