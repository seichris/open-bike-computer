name: CI

on:
  push:
  pull_request:

jobs:
  app-store-screenshots:
    name: App Store Screenshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ios-app/AppStoreScreenshots
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install dependencies without lifecycle scripts
        run: bun install --ignore-scripts --frozen-lockfile
      - name: Audit dependencies
        run: bun audit
      - name: Unit tests
        run: bun test
      - name: Build generator
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Validate committed exports
        run: >-
          bun x tsx scripts/validate-exports.ts
          --dir exports/app-store-screenshots/screenshots
          --allow 1242x2688
          --output /tmp/app-store-screenshots-validation.txt
          --json /tmp/app-store-screenshots-validation.json

  esp32:
    name: ESP32 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - WAVESHARE_AMOLED_175
          - WAVESHARE_AMOLED_175_SPEAKER_HONK
          - WAVESHARE_AMOLED_206
          - WAVESHARE_AMOLED_206_SPEAKER_HONK
    defaults:
      run:
        working-directory: esp32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build firmware
        run: pio run -e "${{ matrix.target }}"

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test generated app build identity
        run: python3 -m unittest discover -s scripts/tests
        working-directory: ios-app
      - name: Run Swift helper tests
        run: ./scripts/run-navigation-tests.sh
        working-directory: ios-app
      - name: Build app
        run: |
          xcodebuild \
            -project BikeComputer/BikeComputer.xcodeproj \
            -scheme BikeComputer \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: ios-app

  osm:
    name: OSM Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/OSM_Extract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml
      - name: Python syntax
        run: |
          python -m py_compile \
            scripts/extract_features.py \
            scripts/block_progress.py \
            scripts/feature_types.py \
            scripts/funcs.py \
            scripts/map_format.py \
            tests/test_config.py \
            tests/test_feature_types.py \
            tests/test_map_format.py
      - name: YAML/config tests
        run: python -m unittest discover -s tests
      - name: Shell syntax
        run: bash -n scripts/pbf_to_geojson.sh
      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./tools/OSM_Extract/scripts
      - name: Compose config
        run: docker compose config
      - name: Build tools image
        run: docker compose build tools
      - name: Smoke test tools image
        run: docker compose run --rm tools python -c "import mapnik; import matplotlib; import shapely; import yaml; from osgeo import ogr"

  backend:
    name: Map Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend test dependencies
        run: python -m pip install -e '.[test,object-storage]'
      - name: Python syntax
        run: python -m py_compile map_platform/*.py tests/*.py
      - name: Generated map stream trust registry
        run: |
          python tools/generate_map_stream_trust.py --check
          python tools/check_map_stream_hardware_gate.py --validate-requirements
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Production Compose config
        env:
          MAP_PLATFORM_API_TOKEN: ci-api-token
          MAP_PLATFORM_DOWNLOAD_SECRET: ci-download-secret
          MAP_PLATFORM_INSTALLATION_SECRET: ci-installation-secret-32-bytes-minimum
          MAP_PLATFORM_MAINTENANCE_INTERVAL_SECONDS: "86400"
        run: docker compose config
      - name: Build backend production image
        run: >-
          docker build
          --file Dockerfile
          --tag open-bike-map-platform-ci
          ..
      - name: Smoke-start backend production image
        run: >-
          docker run --rm
          -e MAP_PLATFORM_API_TOKEN=ci-api-token
          -e MAP_PLATFORM_DOWNLOAD_SECRET=ci-download-secret
          -e MAP_PLATFORM_INSTALLATION_SECRET=ci-installation-secret-32-bytes-minimum
          -e MAP_PLATFORM_DATA_ROOT=/tmp/map-platform-data
          open-bike-map-platform-ci
          python -c "from pathlib import Path; from map_platform.api import create_app; from map_platform.map_stream_build_identity import verify_map_stream_build_identity; identity = verify_map_stream_build_identity(Path('/app/config/map-stream-build-identity.json'), Path('/app')); assert len(identity.producer_build_sha256) == 64; app = create_app(); assert app.title"
      - name: Smoke worker heartbeat
        run: >-
          docker run --rm
          -e MAP_PLATFORM_DATA_ROOT=/tmp/map-platform-data
          -e MAP_PLATFORM_WORKER_HEARTBEAT_PATH=/tmp/map-platform-data/health/worker
          open-bike-map-platform-ci
          bash -ec 'map-platform worker-loop --idle-sleep-seconds 0.1 & worker=$!;
          for attempt in {1..50}; do test -s /tmp/map-platform-data/health/worker && break; sleep 0.1; done;
          test -s /tmp/map-platform-data/health/worker; kill "$worker"; wait "$worker" || true'

  esp32-host:
    name: ESP32 Host Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp32
    steps:
      - uses: actions/checkout@v4
      - name: Install host crypto dependency
        run: sudo apt-get update && sudo apt-get install -y libmbedtls-dev
      - name: GUI layout host tests
        run: |
          PYTHONPATH=tools python -m unittest tools.tests.test_firmware_build_identity
          g++ -std=c++17 \
            tools/tests/test_gui_layout.cpp \
            -o /tmp/test_gui_layout_175
          /tmp/test_gui_layout_175
          g++ -std=c++17 \
            -DWAVESHARE_AMOLED_206 \
            tools/tests/test_gui_layout.cpp \
            -o /tmp/test_gui_layout_206
          /tmp/test_gui_layout_206
      - name: Map profile protocol host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_map_profile_protocol.cpp \
            -o /tmp/test_map_profile_protocol
          /tmp/test_map_profile_protocol
      - name: Device screen protocol host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_device_screen_protocol.cpp \
            -o /tmp/test_device_screen_protocol
          /tmp/test_device_screen_protocol
      - name: Map profile persistence host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_map_profile_persistence.cpp \
            -o /tmp/test_map_profile_persistence
          /tmp/test_map_profile_persistence
      - name: Binary map block format host tests
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror \
            lib/maps/src/mapBlockFormat.cpp \
            tools/tests/test_map_block_format.cpp \
            -o /tmp/test_map_block_format
          /tmp/test_map_block_format
      - name: Map transfer host tests
        run: |
          g++ -std=c++17 \
            lib/map_transfer/map_transfer.cpp \
            lib/maps/src/mapBlockFormat.cpp \
            tools/tests/test_map_transfer.cpp \
            -o /tmp/test_map_transfer
          /tmp/test_map_transfer
      - name: Map stream format host tests
        run: |
          g++ -std=c++17 \
            lib/map_transfer/map_transfer.cpp \
            lib/maps/src/mapBlockFormat.cpp \
            lib/map_transfer/map_stream_format.cpp \
            lib/map_transfer/map_stream_crypto.cpp \
            lib/map_transfer/map_stream_sha.cpp \
            lib/map_transfer/map_stream_trust.cpp \
            lib/map_transfer/map_stream_parser.cpp \
            tools/tests/test_map_stream_format.cpp \
            $(pkg-config --cflags --libs mbedcrypto) \
            -o /tmp/test_map_stream_format
          /tmp/test_map_stream_format
          g++ -std=c++17 -Wall -Wextra -Werror \
            lib/map_transfer/map_transfer.cpp \
            lib/map_transfer/map_stream_format.cpp \
            lib/map_transfer/map_stream_crypto.cpp \
            lib/map_transfer/map_stream_sha.cpp \
            lib/map_transfer/map_stream_trust.cpp \
            lib/map_transfer/map_stream_parser.cpp \
            lib/map_transfer/map_stream_install.cpp \
            lib/map_transfer/map_stream_receiver.cpp \
            lib/map_transfer/map_stream_compiled_trust.cpp \
            lib/maps/src/mapBlockFormat.cpp \
            tools/tests/test_map_stream_install.cpp \
            $(pkg-config --cflags --libs mbedcrypto) \
            -o /tmp/test_map_stream_install
          /tmp/test_map_stream_install
      - name: Transfer control dispatch host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_transfer_control_dispatch.cpp \
            -o /tmp/test_transfer_control_dispatch
          /tmp/test_transfer_control_dispatch
      - name: Device transfer HTTP limit host tests
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror \
            tools/tests/test_device_transfer_http_limits.cpp \
            -o /tmp/test_device_transfer_http_limits
          /tmp/test_device_transfer_http_limits
      - name: Sound protocol host tests
        run: |
          g++ -std=c++17 \
            tools/tests/test_sound_protocol.cpp \
            -o /tmp/test_sound_protocol
          /tmp/test_sound_protocol
      - name: Codec recovery host tests
        run: |
          cc -std=c11 -Wall -Wextra \
            -Itools/tests/host_stubs \
            -Ilib/esp_codec_dev/src \
            tools/tests/test_codec_open.c \
            lib/esp_codec_dev/src/esp_codec_dev.c \
            -lm \
            -o /tmp/test_codec_open
          /tmp/test_codec_open
          cc -std=c11 -Wall -Wextra \
            -Itools/tests/host_stubs \
            -Ilib/esp_codec_dev/src \
            tools/tests/test_es8311_recovery.c \
            lib/esp_codec_dev/src/esp_codec_dev_vol.c \
            -lm \
            -o /tmp/test_es8311_recovery
          /tmp/test_es8311_recovery
