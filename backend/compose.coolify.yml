services:
  map-platform-api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      MAP_PLATFORM_REPO_ROOT: /app
      MAP_PLATFORM_DATA_ROOT: /data
      MAP_PLATFORM_SOURCE_INDEX: /app/backend/config/source-regions.json
    volumes:
      - map-platform-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  map-platform-data:

