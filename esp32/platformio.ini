; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = ESP32 GPS Navigator
default_envs = WAVESHARE_AMOLED_175

[common]
platform = espressif32@6.9.0
framework = arduino
version = 0.2.2
revision = 86
monitor_speed = 115200
;monitor_rts = 0
;monitor_dtr = 0
monitor_filters =
  esp32_exception_decoder
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
extra_scripts = pre:prebuild.py
build_flags = 
  -D LV_CONF_INCLUDE_SIMPLE
  -I lib/lvgl
  -D LV_COLOR_DEPTH=16
  -D CORE_DEBUG_LEVEL=3
  -D DISABLE_RADIO=1
  -D BAUDRATE=115200
  -D DEBUG=1
  -D SHELLMINATOR_BUFF_LEN=70
  -D SHELLMINATOR_BUFF_DIM=70
  -D SHELLMINATOR_LOGO_COLOR=BLUE
  -D COMMANDER_MAX_COMMAND_SIZE=70
  -D WCLI_MAX_CMDS=12           # set n+1 of defined commands for CLI
  ; -D DISABLE_CLI_TELNET=1     # disable remote access via telnet. It needs CLI
  ; -D DISABLE_CLI=1            # removed CLI module. Config via Bluetooth only

lib_deps =
  ; slashdevin/NeoGPS@4.2.9
  https://github.com/jgauchia/NeoGPS.git
 	lvgl/lvgl@9.2.2
  lovyan03/LovyanGFX@1.2.7
  moononournation/GFX Library for Arduino @ ^1.4.7
  ; ^1.4.7
  hpsaturn/EasyPreferences@0.1.3
  hpsaturn/ESP32 Wifi CLI@0.3.4
  kubafilinger/AsyncTCP@1.1.1
  esphome/ESPAsyncWebServer-esphome@3.3.0
  jpb10/SolarCalculator@2.0.1

[esp32_common]
extends = common

[env:ICENAV_BOARD]
;build_type = debug
extends = esp32_common
board = icenav-esp32-s3
lib_deps =
  ${common.lib_deps}
  adafruit/Adafruit Unified Sensor@1.1.15
  adafruit/Adafruit BusIO@1.17.0
  adafruit/Adafruit BME280 Library@2.2.4
  adafruit/Adafruit MPU6050@^2.2.6
  dfrobot/DFRobot_QMC5883@1.0.0
build_flags =
  ${common.build_flags}

[env:TDECK_ESP32S3]
extends = esp32_common
board = T-Deck
lib_deps =
  ${common.lib_deps}
build_flags = 
  ${common.build_flags}
  -DADC1
  -DBATT_PIN=ADC1_CHANNEL_3
  -DPOWER_SAVE
  -DAT6558D_GPS

[env:ELECROW_ESP32]
extends = esp32_common
board = elecrow-esp32-s3-n16r8v-terminal
lib_deps =
  ${common.lib_deps}
; adafruit/Adafruit Unified Sensor@1.1.14
; adafruit/Adafruit BusIO@1.16.2
; adafruit/Adafruit BME280 Library@2.2.4
; dfrobot/DFRobot_QMC5883@1.0.0
build_flags =
  ${common.build_flags}
  -DADC2
  -DBATT_PIN=ADC2_CHANNEL_6
  -DPOWER_SAVE
  ;-DAT6558D_GPS
  ;-DHMC5883L
  ;-DBME280
  -DTFT_BL=46

[env:MAKERF_ESP32S3]
extends = esp32_common
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
lib_deps = 
  ${common.lib_deps}
;  bolderflight/Bolder Flight Systems MPU9250@^1.0.2
build_flags = 
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -DADC1
  -DBATT_PIN=ADC1_CHANNEL_3
  ;-DAT6558D_GPS
  ;-DIMU_MPU9250

[env:ESP32_N16R4]
extends = esp32_common
board = esp-wrover-kit
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps = 
  ${common.lib_deps}
;  adafruit/Adafruit Unified Sensor@1.1.14
;  adafruit/Adafruit BusIO@1.16.2
;  adafruit/Adafruit BME280 Library@2.2.4
;  dfrobot/DFRobot_QMC5883@1.0.0
build_flags = 
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  ;-DADC1
  ;-DAT6558D_GPS
  ;-DHMC5883L
  ;-DBME280
  ;-DILI9488_XPT2046_SPI
  ;-DTFT_BL=33
  
[env:ESP32S3_N16R8]
extends = esp32_common
board = esp32-s3-devkitc-1-n16r8v
board_build.partitions = default_16MB.csv
lib_deps =
  ${common.lib_deps}
;  adafruit/Adafruit Unified Sensor@1.1.14
;  adafruit/Adafruit BusIO@1.16.2
;  adafruit/Adafruit BME280 Library@2.2.4
;  dfrobot/DFRobot_QMC5883@1.0.0
build_flags =
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DSPI_SHARED
  ;-DADC1
  -DILI9341_NOTOUCH_SPI
  ;-DAT6558D_GPS
  ;-DQMC5883
  ;-DBME280
  -DSPI_SHARED
  -DTFT_BL=45

[env:WAVESHARE_AMOLED_175]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
; This board uses 8MB/16MB Flash and OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB
board_build.filesystem = fatfs
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Use pioarduino platform for Arduino Core 3.x (required for Arduino_GFX 1.4.7+)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

; Use Arduino_GFX-compatible libraries
lib_deps =
  https://github.com/jgauchia/NeoGPS.git
  https://github.com/jgauchia/NeoGPS.git
  lvgl/lvgl@9.2.2
  ; LovyanGFX disabled - using Arduino_GFX for AMOLED display
  ; LovyanGFX disabled - using Arduino_GFX for AMOLED display
  ; https://github.com/lovyan03/LovyanGFX.git
  moononournation/GFX Library for Arduino @ ^1.4.7
  ; Temporarily disabled for Core 3.x compatibility - will fix after display works
  ; hpsaturn/EasyPreferences@0.1.3
  ; hpsaturn/ESP32 Wifi CLI@0.3.4
  ; kubafilinger/AsyncTCP@1.1.1
  ; esphome/ESPAsyncWebServer-esphome@3.3.0
  jpb10/SolarCalculator@2.0.1
  ; NimBLE for iOS navigation overlay feature
  h2zero/NimBLE-Arduino@^1.4.1

build_flags =
  -DWAVESHARE_AMOLED_175
  -I include  ; Add global include directory to path
  -DUSE_ARDUINO_GFX  ; Use Arduino_GFX instead of LovyanGFX for CO5300
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; SD Card uses SDMMC 1-bit mode (native interface - more reliable than SPI)
  ; Pins: CLK=14, CMD=17, D0=16 (per Waveshare wiki)
  -DDEFAULT_LAT=35.16755
  -DDEFAULT_LON=136.89451
  -Wno-error=return-type  ; Disable error for missing return statements (NeoGPS compatibility)
  -Wno-error=address-of-packed-member  ; Disable packed member warnings
  ; Temporarily disable features that depend on incompatible libraries
  -DDISABLE_CLI=1  ; Disable CLI (depends on EasyPreferences/WiFi CLI)
  -DDISABLE_RADIO=1  ; Disable radio features
  -DDISABLE_COMPASS=1  ; Disable compass (depends on EasyPreferences)
  -DDISABLE_GESTURES=1  ; Disable gestures (depends on LovyanGFX touch)
  -DDISABLE_WEB_SERVER=1  ; Disable web server features
  ; Bluetooth enabled for iOS navigation overlay
  -DDISABLE_OTA_UPGRADE=1  ; Disable OTA upgrade UI (depends on LovyanGFX tft)
  ; -DDISABLE_MAPS=1
  ; -DDISABLE_TOUCH=1
  -DDISABLE_ADVANCED_GUI=1  ; Disable advanced GUI features (depends on TFT_eSprite)
  -D LV_CONF_PATH="${PROJECT_DIR}/lib/lvgl/lv_conf.h"
  -D CORE_DEBUG_LEVEL=2
  -D BAUDRATE=115200
  -D DEBUG=1
  ; AMOLEDs need high brightness commands, usually handled in driver, 
  ; but we define a default here just in case.
  -DTFT_BL=-1

; ==========================================
; Simple display test environment
; ==========================================
[env:WAVESHARE_TEST]
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.mcu = esp32s3
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

lib_deps =
  moononournation/GFX Library for Arduino @ ^1.4.7

build_src_filter = 
  +<../test_display.cpp>
  -<*>

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -D CORE_DEBUG_LEVEL=3
