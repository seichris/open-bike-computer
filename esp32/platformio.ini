; PlatformIO Project Configuration File
; Headless Navigation Bike Computer - ESP32-S3 AMOLED
; Board: Waveshare ESP32-S3-Touch-AMOLED-1.75
; Platform: pioarduino (Arduino Core v3.0+)

[env:waveshare_amoled]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Library Dependencies
lib_deps =
    lvgl/lvgl @ ^8.3.11
    moononournation/GFX Library for Arduino @ ^1.4.7
    h2zero/NimBLE-Arduino @ ^1.4.1

; Partition scheme for large UI apps with LVGL (16MB Flash)
board_build.partitions = default_16MB.csv

; Flash and PSRAM Configuration for ESP32-S3-WROOM-1-N16R8
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_upload.flash_size = 16MB
; Enable 8MB OPI PSRAM (data only, code stays in flash/IRAM)
board_build.arduino.memory_type = qio_opi

; Build Flags
build_flags = 
    -I include                         ; Include lv_conf.h folder
    -I src/ui                          ; Include SquareLine Studio UI folder
    -D ARDUINO_ESP32S3_DEV             ; ESP32-S3 definition
    -D ARDUINO_USB_MODE=1              ; Enable USB CDC
    -D ARDUINO_USB_CDC_ON_BOOT=1       ; Enable USB CDC on boot
    -D BOARD_HAS_PSRAM                 ; Enable PSRAM support
    -D LV_CONF_INCLUDE_SIMPLE          ; LVGL configuration
    -D LV_TICK_CUSTOM=1                ; Custom tick for LVGL
    -D LV_LVGL_H_INCLUDE_SIMPLE        ; Simplified LVGL include
    -D CORE_DEBUG_LEVEL=3              ; Debug level (0=None, 5=Verbose)

; Upload configuration
upload_protocol = esptool
